name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: commercevision
          MYSQL_USER: commercevision
          MYSQL_PASSWORD: commercevision
          MYSQL_ROOT_PASSWORD: root-change-me
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot-change-me"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      CV_ENVIRONMENT: ci
      CV_MYSQL_DSN: mysql+pymysql://commercevision:commercevision@127.0.0.1:3306/commercevision
      CV_TEST_MYSQL_DSN: mysql+pymysql://root:root-change-me@127.0.0.1:3306/commercevision_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.7"
      - run: uv sync --locked --all-packages
      - run: uv run alembic upgrade head
      - run: uv run alembic check
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run pytest
      - run: uv run python scripts/audit_python.py
      - run: uv run python scripts/export_openapi.py
      - run: git diff --exit-code -- docs/api/openapi.json

  web:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm web:lint
      - run: pnpm web:typecheck
      - run: pnpm web:build
      - run: pnpm audit --audit-level=moderate

  containers:
    name: Container builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f infra/compose/docker-compose.yml config --quiet
      - run: >-
          docker compose -f infra/compose/docker-compose.yml build
          api worker scheduler mcp-server web otel-collector

  security:
    name: Security and SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: anchore/sbom-action@v0
        with:
          path: .
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          if-no-files-found: error
