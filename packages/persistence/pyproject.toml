[project]
name = "commercevision-persistence"
version = "0.1.0"
description = "MySQL persistence, reliable messaging, and LangGraph checkpoint infrastructure"
requires-python = ">=3.13,<3.14"
dependencies = [
  "aiomysql>=0.2,<1",
  "alembic>=1.16,<2",
  "commercevision-contracts",
  "commercevision-domain",
  "langgraph-checkpoint>=4.1.1,<5",
  "pymysql>=1.1,<2",
  "sqlalchemy[asyncio]>=2.0.51,<3",
]

[tool.uv.sources]
commercevision-contracts = { workspace = true }
commercevision-domain = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/commercevision_persistence"]
