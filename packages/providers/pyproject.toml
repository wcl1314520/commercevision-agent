[project]
name = "commercevision-providers"
version = "0.1.0"
description = "External model provider adapters"
requires-python = ">=3.13,<3.14"
dependencies = [
  "commercevision-contracts",
  "httpx>=0.28,<1",
]

[tool.uv.sources]
commercevision-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/commercevision_providers"]
