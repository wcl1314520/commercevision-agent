[project]
name = "commercevision-contracts"
version = "0.1.0"
description = "Shared API, configuration, and event contracts"
requires-python = ">=3.13,<3.14"
dependencies = [
  "commercevision-domain",
  "pydantic>=2.10,<3",
  "pydantic-settings[yaml]>=2.7,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/commercevision_contracts"]

[tool.uv.sources]
commercevision-domain = { workspace = true }
