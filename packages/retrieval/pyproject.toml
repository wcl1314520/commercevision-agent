[project]
name = "commercevision-retrieval"
version = "0.1.0"
description = "Embedding, vector search, and reranking boundary"
requires-python = ">=3.13,<3.14"
dependencies = [
  "commercevision-contracts",
]

[tool.uv.sources]
commercevision-contracts = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/commercevision_retrieval"]
