[project]
name = "commercevision-observability"
version = "0.1.0"
description = "Logging and telemetry conventions"
requires-python = ">=3.13,<3.14"
dependencies = [
  "opentelemetry-api>=1.29,<2",
  "opentelemetry-sdk>=1.29,<2",
  "structlog>=25,<26",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/commercevision_observability"]
