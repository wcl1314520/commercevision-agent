[project]
name = "commercevision-agent-core"
version = "0.1.0"
description = "Durable Agent runtime boundary"
requires-python = ">=3.13,<3.14"
dependencies = [
  "commercevision-contracts",
  "commercevision-domain",
  "commercevision-tool-runtime",
  "langgraph>=1.0.10,<2",
]

[tool.uv.sources]
commercevision-contracts = { workspace = true }
commercevision-domain = { workspace = true }
commercevision-tool-runtime = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/commercevision_agent_core"]
