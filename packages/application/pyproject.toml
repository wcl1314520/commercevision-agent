[project]
name = "commercevision-application"
version = "0.1.0"
description = "CommerceVision workflow use cases and durable execution coordination"
requires-python = ">=3.13,<3.14"
dependencies = [
  "commercevision-contracts",
  "commercevision-domain",
  "commercevision-tool-runtime",
]

[tool.uv.sources]
commercevision-contracts = { workspace = true }
commercevision-domain = { workspace = true }
commercevision-tool-runtime = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/commercevision_application"]
